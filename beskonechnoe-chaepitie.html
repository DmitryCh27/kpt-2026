<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

  <body>
    <div class="page">
      <header class="nav" aria-label="Основная навигация">
        <div class="nav__inner">
          <a class="brand" href="index.html#shows" aria-label="На главную, ко всем постановкам">
            <span class="brand__mark" aria-hidden="true"></span>
            <span>← Все постановки</span>

          <nav class="nav__links" aria-label="Разделы страницы">

            <a href="#staff">Постановщики</a>
          </nav>
        </div>

      <main id="top">

      <footer class="footer">
        <span>© 2026 «Бесконечное чаепитие»</span>
