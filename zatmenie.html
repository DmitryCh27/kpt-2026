<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Затмение — постановка</title>
    <meta name="description" content="Танцевальная постановка «Затмение»: либретто и постановщики.">
    <link rel="stylesheet" href="performance.css">
  </head>
  <body>
    <div class="page">
      <header class="nav" aria-label="Основная навигация">
        <div class="nav__inner">
          <a class="brand" href="index.html#shows" aria-label="На главную, ко всем постановкам">
            <span class="brand__mark" aria-hidden="true"></span>
            <span>← Все постановки</span>
          </a>
          <nav class="nav__links" aria-label="Разделы страницы">
            <a href="#libretto">Либретто</a>
            <a href="#staff">Постановщики</a>
          </nav>
        </div>
      </header>

      <main id="top">
        <section class="hero" style="background-image: linear-gradient(180deg, rgba(11, 11, 13, 0.55) 0%, rgba(11, 11, 13, 0) 24%, rgba(11, 11, 13, 0) 62%, var(--bg) 100%), url(&quot;Затмение/cover.jpg&quot;);" aria-label="Постановка Затмение"></section>

        <section class="hero-intro" aria-label="О постановке">
          <div class="wrap">
            <p class="eyebrow">композиция и постановка танца</p>
            <h1>Затмение</h1>
          </div>
        </section>

        <section id="libretto" class="libretto" aria-labelledby="libretto-title">
          <div class="wrap">
            <div class="section-head"><h2 id="libretto-title">Либретто</h2></div>
            <p class="libretto__text">Затмение — это миг, когда небесные светила перекрывают друг друга, и привычный мир замирает в полумраке.</p>
          </div>
        </section>

        <section id="staff" class="staff" aria-labelledby="staff-title">
          <div class="wrap">
            <div class="section-head"><h2 id="staff-title">Постановщики</h2></div>
            <div class="staff-grid">
              <article class="staff-card">
                <span class="staff-card__num">01</span>
                <h3 class="staff-card__name">296 группа</h3>
              </article>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span>© 2026 «Затмение»</span>
        <span>Композиция и постановка танца</span>
      </footer>
    </div>
  </body>
</html>
