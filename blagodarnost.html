<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Благодарность руководителю — Композиция и постановка танца</title>
    <meta name="description" content="Благодарность руководителю Абдрахимовой Энже Альбертовне за помощь и поддержку.">
    <style>
      :root {
        --bg: #0b0407;
        --text: #f4f1ed;
        --muted: #bdb7b1;
        --line: rgba(255, 255, 255, 0.14);
        --accent: #d01d24;
        --max: 1160px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: var(--bg);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
        display: flex;
        flex-direction: column;
      }

      a { color: inherit; text-decoration: none; }

      .nav {
        position: fixed;
        z-index: 20;
        top: 0;
        left: 0;
        right: 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(11, 4, 7, 0.6);
        backdrop-filter: blur(18px);
      }

      .nav__inner {
        width: min(var(--max), calc(100% - 32px));
        margin: 0 auto;
        height: 62px;
        display: flex;
        align-items: center;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 11px;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand__mark {
        width: 28px;
        height: 28px;
        border: 2px solid var(--accent);
        transform: rotate(45deg);
        flex: 0 0 auto;
      }

      .stage {
        position: relative;
        flex: 1;
        display: grid;
        place-items: center;
        padding: 96px 20px 56px;
        isolation: isolate;
        overflow: hidden;
      }

      .collage {
        position: absolute;
        inset: 0;
        z-index: -2;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        grid-auto-rows: 1fr;
        gap: 6px;
      }

      .collage__cell {
        background-size: cover;
        background-position: center;
        filter: grayscale(0.2) brightness(0.62);
      }

      .stage::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at 50% 42%, rgba(11, 4, 7, 0.45) 0%, rgba(11, 4, 7, 0.82) 58%, rgba(11, 4, 7, 0.96) 100%),
          radial-gradient(120% 70% at 50% -10%, rgba(208, 29, 36, 0.3), transparent 55%);
      }

      .card {
        max-width: 680px;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .card h1 {
        margin: 0 0 22px;
        font-size: clamp(2.6rem, 8vw, 5.2rem);
        line-height: 0.98;
        font-weight: 900;
      }

      .card p {
        margin: 0 auto 16px;
        max-width: 560px;
        font-size: clamp(1.05rem, 2vw, 1.3rem);
        color: rgba(244, 241, 237, 0.9);
      }

      .name {
        display: inline-block;
        margin-top: 10px;
        padding: 12px 22px;
        border: 1px solid var(--accent);
        border-radius: 999px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .back {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 30px;
        color: rgba(244, 241, 237, 0.78);
        font-weight: 700;
        transition: color 0.2s ease;
      }

      .back:hover { color: var(--text); }

      @media (max-width: 640px) {
        .collage { grid-template-columns: repeat(3, 1fr); }
        .stage { padding-top: 84px; }
      }
    </style>
  </head>
  <body>
    <header class="nav" aria-label="Основная навигация">
      <div class="nav__inner">
        <a class="brand" href="index.html#shows" aria-label="На главную, ко всем постановкам">
          <span class="brand__mark" aria-hidden="true"></span>
          <span>← Все постановки</span>
        </a>
      </div>
    </header>

    <main class="stage">
      <div class="collage" id="collage" aria-hidden="true"></div>
      <div class="card">
        <p class="eyebrow">благодарность</p>
        <h1>Спасибо!</h1>
        <p>
          Наши постановки были выполнены под руководством
          <strong>Абдрахимовой Энже Альбертовны.</strong>
        </p>
        <p>Благодарим вас за вашу помощь и поддержку.</p>
        <span class="name">Абдрахимова Энже Альбертовна</span>
        <div>
          <a class="back" href="index.html#shows">← Вернуться к постановкам</a>
        </div>
      </div>
    </main>

    <script>
      const covers = [
        "Бесконечное чаепитие/cover.jpg",
        "Неизбежность конца/Неизбежность конца.jpg",
        "Aurae Tekmor/Тревога.jpg",
        "Начнем с понедельника/Начнем с понедельника.jpg",
        "Be Be/Be Be.jpg",
        "Сын маминой подруги/cover.jpg",
        "Калейдоскоп/Калейдоскоп.jpg",
        "Эхо опасности/cover.jpg",
        "Общее фото.jpg",
        "Последняя капля/cover.jpg",
        "Vigja/Vigja.jpg",
        "Не коснись, а то скиснешь/cover.jpg",
        "True believers/True believers.jpg",
        "Продажа воздуха/Продажа воздуха.jpg",
        "Затмение/cover.jpg"
      ];
      const collage = document.getElementById("collage");
      // Заполняем сетку с запасом, чтобы коллаж покрыл весь экран
      for (let i = 0; i < 30; i += 1) {
        const cell = document.createElement("div");
        cell.className = "collage__cell";
        cell.style.backgroundImage = `url("${covers[i % covers.length]}")`;
        collage.append(cell);
      }
    </script>
  </body>
</html>
